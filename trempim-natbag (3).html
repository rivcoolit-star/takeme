<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טרמפים — נתב״ג</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#eef4fb;min-height:100vh}
.hero{width:100%;display:block}
.hero img{width:100%;display:block;border-radius:0 0 28px 28px}
.hero-caption{text-align:center;padding:14px 16px 4px;background:#eef4fb}
.hero-caption h1{font-size:22px;font-weight:700;color:#1a3a5c;letter-spacing:-0.01em}
.hero-caption p{font-size:13px;color:#5a7a9a;font-weight:300;margin-top:3px}
.app{max-width:680px;margin:0 auto;padding:1rem}
.wrap{max-width:680px;margin:0 auto}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;background:#d8e8f5;padding:5px;border-radius:18px}
.tab{flex:1;padding:9px;text-align:center;font-size:14px;cursor:pointer;border-radius:14px;border:none;background:transparent;color:#5a7a9a;transition:all 0.2s;font-family:'Heebo',sans-serif;font-weight:400}
.tab.active{background:#fff;color:#1a3a5c;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card{background:#fff;border:1px solid rgba(180,210,235,0.6);border-radius:20px;padding:1.25rem 1.5rem;margin-bottom:1rem;box-shadow:0 2px 12px rgba(80,140,200,0.08)}
.form-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:130px}
.form-group label{font-size:12px;color:#5a7a9a;font-weight:500}
.form-group input,.form-group select{width:100%;padding:9px 12px;font-size:14px;border:1.5px solid rgba(140,190,230,0.6);border-radius:12px;background:#f4f9fd;color:#1a3a5c;font-family:'Heebo',sans-serif;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus{border-color:#3a80c0;background:#fff}
.form-group .hint{font-size:11px;color:#8aabca}
.saved-user{background:linear-gradient(135deg,#e8f0fa,#ddeafa);border:1.5px solid #7aaad8;border-radius:16px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.saved-user-info{font-size:14px;color:#1a3a5c}
.saved-user-name{font-weight:600}
.saved-user-details{font-size:12px;color:#5a7a9a;margin-top:2px;font-weight:300}
.btn-clear-user{padding:5px 12px;border-radius:10px;border:1px solid #7aaad8;background:#fff;color:#5a7a9a;font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;white-space:nowrap}
.type-toggle{display:flex;gap:8px;margin-bottom:18px}
.type-btn{flex:1;padding:11px;border:2px solid rgba(140,190,230,0.5);border-radius:14px;background:#f4f9fd;cursor:pointer;font-size:14px;color:#5a7a9a;transition:all 0.2s;font-family:'Heebo',sans-serif;font-weight:400}
.type-btn.active-offer{background:#e8f0fa;border-color:#1a4a8a;color:#1a3a6a;font-weight:600}
.type-btn.active-need{background:#e0f4fb;border-color:#2aaad0;color:#0a7a9a;font-weight:600}
.section-label{font-size:12px;color:#5a7a9a;font-weight:500;margin-bottom:8px;display:block}
.route-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.route-tab{padding:6px 14px;border:1.5px solid rgba(140,190,230,0.5);border-radius:20px;background:#f4f9fd;font-size:13px;cursor:pointer;color:#5a7a9a;font-family:'Heebo',sans-serif;transition:all 0.15s}
.route-tab.active{background:#ddeafa;border-color:#3a80c0;color:#1a3a5c;font-weight:500}
.range-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.range-select{flex:1;padding:9px 10px;font-size:14px;border:1.5px solid rgba(140,190,230,0.6);border-radius:12px;background:#f4f9fd;color:#1a3a5c;font-family:'Heebo',sans-serif;outline:none;min-width:0}
.range-select:focus{border-color:#3a80c0;background:#fff}
.range-arrow{font-size:16px;color:#8aabca;flex-shrink:0}
.range-preview{background:#f0f6fd;border:1px solid #b8d8f0;border-radius:10px;padding:8px 12px;font-size:12px;color:#1a3a5c;margin-bottom:14px;min-height:32px}
.fuel-toggle{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:10px 14px;border:1.5px solid rgba(140,190,230,0.5);border-radius:14px;background:#f4f9fd;cursor:pointer;transition:all 0.2s;user-select:none}
.fuel-toggle.active{background:#eefaf2;border-color:#4ab870;}
.fuel-icon{font-size:20px;flex-shrink:0}
.fuel-text{font-size:14px;color:#5a7a9a;flex:1}
.fuel-toggle.active .fuel-text{color:#2a7a48;font-weight:500}
.fuel-check{width:22px;height:22px;border-radius:50%;border:2px solid #b0c8d8;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.fuel-toggle.active .fuel-check{background:#4ab870;border-color:#4ab870;color:#fff;font-size:13px;font-weight:700}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#2a70c0,#1a4a90);border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;color:#fff;transition:all 0.2s;font-family:'Heebo',sans-serif;box-shadow:0 3px 14px rgba(26,74,144,0.3)}
.btn-submit:hover{transform:translateY(-1px)}
.btn-submit:disabled{opacity:0.6;transform:none;cursor:not-allowed}
.ride-card{background:#fff;border:1px solid rgba(180,210,235,0.5);border-radius:20px;padding:1.1rem 1.3rem;margin-bottom:0.85rem;box-shadow:0 2px 10px rgba(80,140,200,0.07);transition:all 0.2s;border-right:5px solid #ccc}
.ride-card.offer-card{border-right-color:#1a4a8a;background:linear-gradient(135deg,#fff 80%,#f0f5fc)}
.ride-card.need-card{border-right-color:#2aaad0;background:linear-gradient(135deg,#fff 80%,#f0fafd)}
.ride-card.mine{box-shadow:0 2px 12px rgba(80,140,200,0.18)}
.ride-card:hover{box-shadow:0 4px 18px rgba(80,140,200,0.15);transform:translateY(-1px)}
.ride-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ride-header-right{display:flex;flex-direction:column;gap:2px}
.ride-name{font-size:15px;font-weight:600;color:#1a3a5c}
.ride-location{font-size:13px;color:#5a7a9a;margin-top:2px;font-weight:300}
.ride-header-left{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.badge-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.badge-offer{background:#ddeafa;color:#1a3a7a;border:1.5px solid #7aaad8}
.badge-need{background:#d0f0fa;color:#0a6a8a;border:1.5px solid #60c0dc}
.badge-fuel{background:#eefaf2;color:#2a7a48;border:1.5px solid #80d0a0;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.btn-delete{padding:3px 10px;border-radius:10px;border:1px solid #ffaaaa;background:#fff5f5;color:#c03030;font-size:11px;font-family:'Heebo',sans-serif;cursor:pointer}
.btn-delete:hover{background:#ffe0e0}
.ride-meta{display:flex;gap:10px;font-size:12px;color:#5a7a9a;margin-bottom:12px;flex-wrap:wrap;align-items:center;font-weight:300}
.date-chip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.date-chip.today{background:#ddeafa;color:#1a3a7a;border:1px solid #7aaad8}
.date-chip.future{background:#d0f0fa;color:#0a6a8a;border:1px solid #60c0dc}
.meta-dot{color:#a0c0d8}
.ride-actions{display:flex;gap:8px}
.btn-action{flex:1;padding:8px 10px;border-radius:12px;border:1.5px solid rgba(140,190,230,0.6);background:#f4f9fd;font-size:13px;cursor:pointer;color:#1a3a5c;font-family:'Heebo',sans-serif;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.18s}
.btn-action:hover{background:#ddeafa}
.btn-wa{border-color:#60c0dc;color:#0a6a8a}
.btn-wa:hover{background:#d0f0fa}
.match-alert{background:linear-gradient(135deg,#f0f8ff,#e8f4fc);border:1.5px solid #7aaad8;border-radius:18px;padding:14px 16px;margin-bottom:12px;font-size:13px;color:#1a3a5c}
.match-title{font-weight:700;margin-bottom:6px;font-size:13px;color:#1a4a8a}
.match-people{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.match-person{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px}
.match-person-name{font-weight:600;color:#1a3a5c}
.match-person-city{color:#5a8ab0;font-weight:300;font-size:12px}
.btn-match-wa{padding:5px 12px;border-radius:10px;border:1.5px solid #2aaad0;background:#d0f0fa;color:#0a6a8a;font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;font-weight:500;white-space:nowrap}
.match-note{font-size:12px;color:#5a8ab0;margin-top:4px}
.filter-row{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.filter-btn{padding:7px 16px;border:1.5px solid rgba(140,190,230,0.5);border-radius:20px;background:#f4f9fd;font-size:13px;cursor:pointer;color:#5a7a9a;font-family:'Heebo',sans-serif;transition:all 0.18s}
.filter-btn.active{background:#fff;color:#1a3a5c;border-color:#3a80c0;font-weight:600}
.empty{text-align:center;padding:2.5rem 1rem;color:#5a7a9a;font-size:14px}
.loading{text-align:center;padding:2rem;color:#5a7a9a;font-size:14px}
.status-bar{text-align:center;font-size:12px;color:#8aabca;margin-bottom:1rem}
.err{background:#fff0f0;border:1px solid #fcc;border-radius:12px;padding:10px 14px;font-size:13px;color:#c0392b;margin-bottom:1rem;text-align:center}
</style>
</head>

<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="showTab('board')">לוח נסיעות</button>
    <button class="tab" onclick="showTab('add')">הוספת נסיעה</button>
  </div>
  <div id="tab-board">
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">הכל</button>
      <button class="filter-btn" onclick="setFilter('offer',this)">הצעות נסיעה</button>
      <button class="filter-btn" onclick="setFilter('need',this)">חיפוש טרמפ</button>
    </div>
    <div id="status-bar" class="status-bar"></div>
    <div id="matches-section"></div>
    <div id="rides-list"><div class="loading">טוען נסיעות...</div></div>
  </div>
  <div id="tab-add" style="display:none">
    <div class="card">
      <div id="saved-user-banner"></div>
      <div class="type-toggle">
        <button class="type-btn active-offer" id="btn-offer" onclick="setType('offer')">🚗 הצעת נסיעה</button>
        <button class="type-btn" id="btn-need" onclick="setType('need')">✋ חיפוש טרמפ</button>
      </div>
      <div id="user-fields">
        <div class="form-row">
          <div class="form-group" style="flex:2"><label>שם</label><input type="text" id="f-name" placeholder="שם מלא"></div>
          <div class="form-group" style="flex:2"><label>טלפון</label><input type="tel" id="f-phone" placeholder="05X-XXXXXXX" dir="ltr"></div>
        </div>
      </div>
      <span class="section-label">נקודת איסוף — כביש וטווח</span>
      <div class="route-tabs">
        <button class="route-tab active" onclick="selectRoute('4',this)">כביש 4</button>
        <button class="route-tab" onclick="selectRoute('40',this)">כביש 40</button>

        <button class="route-tab" onclick="selectRoute('1',this)">כביש 1</button>
        <button class="route-tab" onclick="selectRoute('431',this)">כביש 431</button>
      </div>
      <div class="range-row">
        <select id="sel-from" class="range-select" onchange="updateRange()"></select>
        <span class="range-arrow">←</span>
        <select id="sel-to" class="range-select" onchange="updateRange()"></select>
      </div>
      <div class="range-preview" id="range-preview">בחר שתי נקודות</div>
      <div class="fuel-toggle" id="fuel-toggle" onclick="toggleFuel()">
        <span class="fuel-icon">⛽</span>

      <div class="form-row">

        <div class="form-group"><label>שעת חזרה הביתה</label><input type="time" id="f-time-from"><div class="hint">השאר ריק אם לא רלוונטי</div></div>

      <div id="form-err"></div>
      <button class="btn-submit" id="btn-submit" onclick="addRide()">פרסום</button>
    </div>
  </div>

let currentRoute='4',currentType='offer',currentFilter='all',rides=[],fuelRequested=false;

document.getElementById('f-date').value=todayStr();
document.getElementById('f-date').min=todayStr();

function toggleFuel(){
  fuelRequested=!fuelRequested;
  const t=document.getElementById('fuel-toggle');
  const c=document.getElementById('fuel-check');
  t.classList.toggle('active',fuelRequested);
  c.textContent=fuelRequested?'✓':'';
}

function selectRoute(r,el){
  currentRoute=r;
  document.querySelectorAll('.route-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const pts=ROADS[r];
  const sf=document.getElementById('sel-from'),st=document.getElementById('sel-to');
  sf.innerHTML=pts.map((p,i)=>`<option value="${i}">${p.n}</option>`).join('');
  st.innerHTML=pts.map((p,i)=>`<option value="${i}">${p.n}</option>`).join('');
  st.value=pts.length-1;
  updateRange();
}

function updateRange(){
  const pts=ROADS[currentRoute];
  const i1=parseInt(document.getElementById('sel-from').value);
  const i2=parseInt(document.getElementById('sel-to').value);
  const prev=document.getElementById('range-preview');
  if(i1===i2){prev.textContent='בחר שתי נקודות שונות';return;}
  const from=Math.min(i1,i2),to=Math.max(i1,i2);
  prev.textContent=`כביש ${currentRoute}: ${pts[from].n} ← ${pts[to].n}`;
}

function getRangeData(){
  const pts=ROADS[currentRoute];
  const i1=parseInt(document.getElementById('sel-from').value);
  const i2=parseInt(document.getElementById('sel-to').value);
  const from=Math.min(i1,i2),to=Math.max(i1,i2);
  return{road:currentRoute,fromCity:pts[from].n,toCity:pts[to].n,fromIdx:from,toIdx:to,display:`כביש ${currentRoute}: ${pts[from].n} ← ${pts[to].n}`};
}

function parseRange(r){
  if(!r.fromCity||!r.toCity||!r.road) return null;
  const pts=ROADS[r.road];if(!pts) return null;
  const fi=pts.findIndex(p=>p.n===r.fromCity),ti=pts.findIndex(p=>p.n===r.toCity);
  if(fi<0||ti<0) return null;
  return{road:r.road,fromIdx:Math.min(fi,ti),toIdx:Math.max(fi,ti),fromCity:r.fromCity,toCity:r.toCity};
}

function rangesOverlap(a,b){
  if(a.road!==b.road) return false;
  return a.fromIdx<=b.toIdx&&b.fromIdx<=a.toIdx;
}

function overlapDesc(a,b){
  const pts=ROADS[a.road];
  const start=Math.max(a.fromIdx,b.fromIdx),end=Math.min(a.toIdx,b.toIdx);
  if(start>end) return null;
  if(start===end) return pts[start].n;
  return `${pts[start].n} — ${pts[end].n}`;
}

function todayStr(){return new Date().toISOString().slice(0,10)}
function nowMin(){const d=new Date();return d.getHours()*60+d.getMinutes()}
function isExpired(r){
  const today=todayStr();
  if(!r.date||r.date<today) return true;
  if(r.date>today) return false;
  const now=nowMin(),times=[];
  if(r.timeTo){const[h,m]=r.timeTo.split(':');times.push(parseInt(h)*60+parseInt(m));}
  if(r.timeFrom){const[h,m]=r.timeFrom.split(':');times.push(parseInt(h)*60+parseInt(m));}
  if(!times.length) return false;
  return Math.max(...times)<now;
}
function waLink(p){const c=p.replace(/\D/g,'');return'https://wa.me/'+(c.startsWith('0')?'972'+c.slice(1):c)}

function dateLabel(s){
  const today=todayStr();
  const tom=new Date();tom.setDate(tom.getDate()+1);
  const tomorrow=tom.toISOString().slice(0,10);
  if(s===today) return{label:'היום',cls:'today'};
  if(s===tomorrow) return{label:'מחר',cls:'future'};
  const d=new Date(s);
  const days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const months=['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];
  return{label:`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`,cls:'future'};
}

function findMatches(list){
  const res=[],offers=list.filter(r=>r.type==='offer'),needs=list.filter(r=>r.type==='need');
  const byDate={};
  offers.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r)});
  Object.keys(byDate).forEach(date=>{
    const day=byDate[date];
    for(let i=0;i<day.length;i++)for(let j=i+1;j<day.length;j++){
      const ra=parseRange(day[i]),rb=parseRange(day[j]);
      if(ra&&rb&&rangesOverlap(ra,rb)) res.push({type:'drivers',people:[day[i],day[j]],date,overlap:overlapDesc(ra,rb)});
    }
  });
  offers.forEach(o=>needs.forEach(n=>{
    if(o.date!==n.date) return;
    const ro=parseRange(o),rn=parseRange(n);
    if(ro&&rn&&rangesOverlap(ro,rn)) res.push({type:'nearby',offer:o,need:n,date:o.date,overlap:overlapDesc(ro,rn)});
  }));
  return res;
}

function timeStr(a,b){const p=[];if(a)p.push('יציאה '+a);if(b)p.push('חזרה '+b);return p.join(' · ')||'שעה לא צוינה'}
function matchWaBtn(person){
  return`<a class="btn-match-wa" href="${waLink(person.phone)}" target="_blank">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    ${person.phone}
  </a>`;
}

async function deleteRide(id){
  if(!confirm('למחוק את הנסיעה?')) return;
  try{
    await fetch(API,{method:'POST',body:JSON.stringify({action:'delete',id})});
    rides=rides.filter(r=>String(r.id)!==String(id));render();
  }catch(e){alert('שגיאה במחיקה')}
}

function render(){
  const u=loadSavedUser();
  const myPhone=u?u.phone.replace(/\D/g,''):'';
  const filtered=rides.filter(r=>currentFilter==='all'||r.type===currentFilter);
  const matches=findMatches(rides);
  document.getElementById('matches-section').innerHTML=matches.map(m=>{
    const dl=dateLabel(m.date);
    if(m.type==='drivers'){
      const[a,b]=m.people;
      return`<div class="match-alert">
        <div class="match-title">🚗 שתי הצעות נסיעה על כביש ${a.road} — ${dl.label}</div>
        <div class="match-people">
          <div class="match-person"><div><span class="match-person-name">${a.name}</span> <span class="match-person-city">${a.city}</span></div>${matchWaBtn(a)}</div>
          <div class="match-person"><div><span class="match-person-name">${b.name}</span> <span class="match-person-city">${b.city}</span></div>${matchWaBtn(b)}</div>
        </div>
        ${m.overlap?`<div class="match-note">אזור חפיפה: ${m.overlap}</div>`:''}
      </div>`;
    }
    if(m.type==='nearby'){
      return`<div class="match-alert">
        <div class="match-title">✨ התאמה אפשרית — ${dl.label}</div>
        <div class="match-people">
          <div class="match-person"><div><span class="match-person-name">${m.offer.name}</span> <span class="match-person-city">${m.offer.city} · הצעת נסיעה</span></div>${matchWaBtn(m.offer)}</div>
          <div class="match-person"><div><span class="match-person-name">${m.need.name}</span> <span class="match-person-city">${m.need.city} · חיפוש טרמפ</span></div>${matchWaBtn(m.need)}</div>
        </div>
        ${m.overlap?`<div class="match-note">אזור חפיפה: ${m.overlap}</div>`:''}
      </div>`;
    }
    return'';
  }).join('');

  const listDiv=document.getElementById('rides-list');
  if(!filtered.length){listDiv.innerHTML='<div class="empty">✈️<br>אין נסיעות פעילות כרגע</div>';return}
  const groups={};
  filtered.forEach(r=>{if(!groups[r.date])groups[r.date]=[];groups[r.date].push(r)});
  listDiv.innerHTML=Object.keys(groups).sort().map(date=>{
    const dl=dateLabel(date);
    return groups[date].map(r=>{
      const isMine=myPhone&&r.phone.replace(/\D/g,'')===myPhone;
      return`<div class="ride-card ${r.type==='offer'?'offer-card':'need-card'}${isMine?' mine':''}">
        <div class="ride-header">
          <div class="ride-header-right">
            <div class="ride-name">${r.name}${isMine?' ⭐':''}</div>
            <div class="ride-location">${r.city}</div>
          </div>
          <div class="ride-header-left">
            <div class="badge-row">
              <span class="badge ${r.type==='offer'?'badge-offer':'badge-need'}">${r.type==='offer'?'🚗 הצעת נסיעה':'✋ חיפוש טרמפ'}</span>
              ${r.fuel?'<span class="badge-fuel">⛽ ₪</span>':''}
            </div>
            ${isMine?`<button class="btn-delete" onclick="deleteRide('${r.id}')">מחיקה</button>`:''}
          </div>
        </div>
        <div class="ride-meta">
          <span class="date-chip ${dl.cls}">${dl.label}</span>
          <span class="meta-dot">·</span>
          <span>${timeStr(r.timeTo,r.timeFrom)}</span>
        </div>
        <div class="ride-actions">
          <a class="btn-action" href="tel:${r.phone.replace(/\D/g,'')}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01-.07 1.13 2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg>
            ${r.phone}
          </a>
          <a class="btn-action btn-wa" href="${waLink(r.phone)}" target="_blank">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            וואטסאפ
          </a>
        </div>
      </div>`;
    }).join('');
  }).join('');
}

function loadSavedUser(){try{return JSON.parse(localStorage.getItem('natbag_user')||'null')}catch{return null}}
function saveUser(name,phone,city,road){localStorage.setItem('natbag_user',JSON.stringify({name,phone,city,road}))}
function clearUser(){
  localStorage.removeItem('natbag_user');renderUserBanner();
  document.getElementById('user-fields').style.display='block';
  ['f-name','f-phone'].forEach(id=>document.getElementById(id).value='');
}
function renderUserBanner(){
  const u=loadSavedUser();
  const banner=document.getElementById('saved-user-banner');
  document.getElementById('user-fields').style.display=u?'none':'block';
  banner.innerHTML=u?`<div class="saved-user">
    <div class="saved-user-info">
      <div class="saved-user-name">👋 שלום, ${u.name}</div>
      <div class="saved-user-details">${u.city} · ${u.phone}</div>
    </div>
    <button class="btn-clear-user" onclick="clearUser()">שינוי פרטים</button>
  </div>`:'';
}

async function loadRides(){
  try{
    const res=await fetch(API+'?action=get');
    const data=await res.json();
    rides=(data||[]).filter(r=>!isExpired(r));render();
    const t=new Date();
    document.getElementById('status-bar').textContent='עודכן ב-'+t.getHours()+':'+String(t.getMinutes()).padStart(2,'0');
  }catch(e){
    document.getElementById('rides-list').innerHTML='<div class="err">שגיאה בטעינה — בדקי חיבור לאינטרנט</div>';
  }
}

function showTab(t){
  document.getElementById('tab-board').style.display=t==='board'?'block':'none';
  document.getElementById('tab-add').style.display=t==='add'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='board')||(i===1&&t==='add')));
  if(t==='board') loadRides();
  if(t==='add') renderUserBanner();
}
function setType(t){
  currentType=t;
  document.getElementById('btn-offer').className='type-btn'+(t==='offer'?' active-offer':'');
  document.getElementById('btn-need').className='type-btn'+(t==='need'?' active-need':'');
}
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');render();
}

async function addRide(){
  const u=loadSavedUser();
  const name=u?u.name:document.getElementById('f-name').value.trim();
  const phone=u?u.phone:document.getElementById('f-phone').value.trim();
  const rd=getRangeData();
  const date=document.getElementById('f-date').value||todayStr();
  const timeTo=document.getElementById('f-time-to').value;
  const timeFrom=document.getElementById('f-time-from').value;
  const errDiv=document.getElementById('form-err');
  if(!name||!phone){errDiv.innerHTML='<div class="err">נא למלא שם וטלפון</div>';return}
  if(rd.fromIdx===rd.toIdx){errDiv.innerHTML='<div class="err">נא לבחור שתי נקודות שונות על הכביש</div>';return}
  errDiv.innerHTML='';
  if(!u) saveUser(name,phone,rd.display,rd.road);
  const r={
    action:'add',id:Date.now(),type:currentType,name,phone,
    city:rd.display,road:rd.road,fromCity:rd.fromCity,toCity:rd.toCity,
    fromIdx:rd.fromIdx,toIdx:rd.toIdx,
    fuel:fuelRequested,
    date,timeTo,timeFrom,route:rd.road,ts:Date.now()
  };
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;btn.textContent='שולח...';
  try{
    await fetch(API,{method:'POST',body:JSON.stringify(r)});
    document.getElementById('f-time-to').value='';
    document.getElementById('f-time-from').value='';
    document.getElementById('f-date').value=todayStr();
    fuelRequested=false;
    document.getElementById('fuel-toggle').classList.remove('active');
    document.getElementById('fuel-check').textContent='';
    btn.textContent='פורסם! ✓';
    setTimeout(()=>{btn.disabled=false;btn.textContent='פרסום';},1500);
    showTab('board');
  }catch(e){
    errDiv.innerHTML='<div class="err">שגיאה בשליחה — נסי שוב</div>';
    btn.disabled=false;btn.textContent='פרסום';
  }
}

selectRoute('4',document.querySelector('.route-tab'));
loadRides();
setInterval(loadRides,60000);
</script>
